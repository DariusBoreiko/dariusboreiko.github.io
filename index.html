<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 3em;
  letter-spacing: 2px;
}

.gallery {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 40px;
}

.gallery img {
  width: 280px;
  border-radius: 12px;
  transition: transform 0.3s, box-shadow 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px red;
}

#rpm {
  font-size: 2em;
  margin: 20px;
}

button {
  padding: 20px 40px;
  font-size: 1.5em;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}

button:active {
  transform: scale(0.95);
  box-shadow: 0 0 30px red;
}
</style>
</head>
<body>

<h1>Kawasaki Ninja ZX6R</h1>

<img src="bike1.jpg">
<img src="bike2.jpg">
<img src="bike3.jpg">

<h2 id="rpm">RPM: 0</h2>

<button onclick="rev()">REV 🔥</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  // paste your config here
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rpmRef = doc(db, "stats", "rpm");

async function loadRPM() {
  const snap = await getDoc(rpmRef);
  if (!snap.exists()) {
    await setDoc(rpmRef, { value: 0 });
    return 0;
  }
  return snap.data().value;
}

async function rev() {
  await updateDoc(rpmRef, {
    value: increment(1)
  });

  const snap = await getDoc(rpmRef);
  document.getElementById("rpm").innerText =
    "RPM: " + snap.data().value;
}

loadRPM().then(val => {
  document.getElementById("rpm").innerText = "RPM: " + val;
});

window.rev = rev;
</script>
</body>
</html>

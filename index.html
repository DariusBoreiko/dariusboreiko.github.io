<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 3em;
  letter-spacing: 2px;
}

.gallery {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 40px;
  flex-wrap: wrap;
}
    
.gallery img {
  width: 30%;
  max-width: 350px;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
    
.gallery img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px red;
}

.gallery img {
  cursor: pointer;
}
    
#rpm {
  font-size: 2em;
  margin: 20px;
}

button {
  padding: 20px 40px;
  font-size: 1.5em;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}

button:active {
  transform: scale(0.95);
  box-shadow: 0 0 30px red;
}

#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

#lightbox {
  transition: opacity 0.3s;
}

.tachometer {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 40px auto;
  border-radius: 50%;
  background: conic-gradient(
    black 30deg 120deg,
    gainsboro 120deg 290deg,
    gold 290deg 345deg,
    crimson 345deg 30deg
  );
  display: flex;
  justify-content: center;
  align-items: center;
}

.dial {
  width: 85%;
  height: 85%;
  background: black;
  border-radius: 50%;
}

#needle {
  position: absolute;
  width: 4px;
  height: 120px;
  background: crimson;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
  transform: rotate(-240deg);
  transition: transform 0.05s linear;
}
    
</style>
</head>
<body>

<h1>🏍️ Kawasaki Ninja ZX6R 🥷</h1>

<div class="gallery">
  <img src="bike1.jpg" onclick="openLightbox(this)">
  <img src="bike2.jpg" onclick="openLightbox(this)">
  <img src="bike3.jpg" onclick="openLightbox(this)">
</div>

<div class="tachometer">
  <div class="dial"></div>
  <div id="needle"></div>
</div>

<h2 id="rpm">0 RPM</h2>

<button
  onmousedown="startRev()"
  onmouseup="stopRev()"
  onmouseleave="stopRev()"
>
  REV IT 🔥
</button>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMx_rZgbi75r06S84gOw7gKEvYEbKAA9s",
  authDomain: "crimsonrev-6fe97.firebaseapp.com",
  projectId: "crimsonrev-6fe97",
  storageBucket: "crimsonrev-6fe97.firebasestorage.app",
  messagingSenderId: "106583257027",
  appId: "1:106583257027:web:4fc0f83267599220445776",
  measurementId: "G-ZT32170HNL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rpmRef = doc(db, "stats", "rpm");

loadRPM().then(val => {
  currentRPM = val; // IMPORTANT
  document.getElementById("rpm").innerText = val + " RPM";
  updateNeedle();
});
  
async function loadRPM() {
  const snap = await getDoc(rpmRef);
  if (!snap.exists()) {
    await setDoc(rpmRef, { value: 0 });
    return 0;
  }
  return snap.data().value;
}

async function revClickCounter() {
  await updateDoc(rpmRef, {
    value: increment(1)
  }).catch(async () => {
    await setDoc(rpmRef, { value: 1 });
  });
}
  
async function rev() {
  const rpmEl = document.getElementById("rpm");

  let current = parseInt(rpmEl.innerText) || 0;
  current++;
  rpmEl.innerText = current + " RPM";

  try {
    await updateDoc(rpmRef, {
      value: increment(1)
    });
  } catch {
    await setDoc(rpmRef, { value: current });
  }
}

loadRPM().then(val => {
  document.getElementById("rpm").innerText = val + " RPM";
});

window.rev = rev;

function openLightbox(img) {
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  lightbox.style.display = "flex";
  lightboxImg.src = img.src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

window.openLightbox = openLightbox;
window.closeLightbox = closeLightbox;

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLightbox();
});

let currentRPM = 0;
let interval = null;

const MAX_RPM = 20000;
const LIMITER = 16400;

// convert RPM → needle angle
function rpmToAngle(rpm) {
  const minAngle = 120;
  const maxAngle = 360;
  return minAngle + (rpm / MAX_RPM) * (maxAngle - minAngle);
}

function updateNeedle() {
  const needle = document.getElementById("needle");
  if (!needle) return;

  needle.style.transform = `rotate(${rpmToAngle(currentRPM)}deg)`;
}

function startRev() {
  if (interval) return;

  interval = setInterval(() => {
    if (currentRPM < LIMITER) {
      currentRPM += 600; // fast rise
    } else {
      currentRPM -= 900; // limiter bounce
    }

    if (currentRPM < 0) currentRPM = 0;

    document.getElementById("rpm").innerText = Math.floor(currentRPM) + " RPM";
    updateNeedle();
  }, 50);
}

function stopRev() {
  clearInterval(interval);
  interval = null;

  revClickCounter();

  const decay = setInterval(() => {
    if (currentRPM <= 0) {
      currentRPM = 0;
      clearInterval(decay);
      return;
    }

    currentRPM -= 800;

    document.getElementById("rpm").innerText = Math.floor(currentRPM) + " RPM";
    updateNeedle();
  }, 40);
}  

window.startRev = startRev;
window.stopRev = stopRev;
window.revClickCounter = revClickCounter;
window.updateNeedle = updateNeedle;
  
</script>
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
</body>
</html>

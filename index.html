<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    img {
      width: 300px;
      margin: 10px;
    }
    button {
      padding: 15px;
      font-size: 20px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Kawasaki Ninja ZX6R</h1>

<img src="bike1.jpg">
<img src="bike2.jpg">
<img src="bike3.jpg">

<h2 id="rpm">RPM: 0</h2>

<button onclick="rev()">REV 🔥</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  // paste your config here
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rpmRef = doc(db, "stats", "rpm");

async function loadRPM() {
  const snap = await getDoc(rpmRef);
  if (!snap.exists()) {
    await setDoc(rpmRef, { value: 0 });
    return 0;
  }
  return snap.data().value;
}

async function rev() {
  await updateDoc(rpmRef, {
    value: increment(1)
  });

  const snap = await getDoc(rpmRef);
  document.getElementById("rpm").innerText =
    "RPM: " + snap.data().value;
}

loadRPM().then(val => {
  document.getElementById("rpm").innerText = "RPM: " + val;
});

window.rev = rev;
</script>
</body>
</html>

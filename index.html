<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 3em;
  letter-spacing: 2px;
}

.gallery {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin: 40px;
  flex-wrap: wrap;
}

.gallery img {
  width: 100%;
  max-width: 500px;
  height: auto;
}

.gallery img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px red;
}

.gallery img {
  cursor: pointer;
}
    
#rpm {
  font-size: 2em;
  margin: 20px;
}

button {
  padding: 20px 40px;
  font-size: 1.5em;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}

button:active {
  transform: scale(0.95);
  box-shadow: 0 0 30px red;
}

#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

#lightbox {
  transition: opacity 0.3s;
}

</style>
</head>
<body>

<h1>🏍️ Kawasaki Ninja ZX6R 🥷</h1>

<div class="gallery">
  <img src="bike1.jpg" onclick="openLightbox(this)">
  <img src="bike2.jpg" onclick="openLightbox(this)">
  <img src="bike3.jpg" onclick="openLightbox(this)">
</div>

<h2 id="rpm">RPM: 0</h2>

<button onclick="rev()">REV 🔥</button>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMx_rZgbi75r06S84gOw7gKEvYEbKAA9s",
  authDomain: "crimsonrev-6fe97.firebaseapp.com",
  projectId: "crimsonrev-6fe97",
  storageBucket: "crimsonrev-6fe97.firebasestorage.app",
  messagingSenderId: "106583257027",
  appId: "1:106583257027:web:4fc0f83267599220445776",
  measurementId: "G-ZT32170HNL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rpmRef = doc(db, "stats", "rpm");

async function loadRPM() {
  const snap = await getDoc(rpmRef);
  if (!snap.exists()) {
    await setDoc(rpmRef, { value: 0 });
    return 0;
  }
  return snap.data().value;
}

async function rev() {
  const rpmEl = document.getElementById("rpm");

  let current = parseInt(rpmEl.innerText.replace("RPM: ", "")) || 0;
  current++;
  rpmEl.innerText = "RPM: " + current;

  try {
    await updateDoc(rpmRef, {
      value: increment(1)
    });
  } catch {
    await setDoc(rpmRef, { value: current });
  }
}

loadRPM().then(val => {
  document.getElementById("rpm").innerText = "RPM: " + val;
});

window.rev = rev;

function openLightbox(img) {
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  lightbox.style.display = "flex";
  lightboxImg.src = img.src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

window.openLightbox = openLightbox;
window.closeLightbox = closeLightbox;

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLightbox();
});
  
</script>
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
</body>
</html>
